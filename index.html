<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wine Language App</title>

<link rel="stylesheet" href="styles.css">


</head>

<body>

<header>


<div class="headerContent">

    <h1>Wine Language App</h1>

    <p>Learn wine terminology in English, Spanish, and French</p>

</div>


</header>

<main>


<!-- Tabs -->

<div class="tabBar">

    <button id="dictionaryTab" class="activeTab">Dictionary</button>

    <button id="flashcardTab">Flashcards</button>

</div>

<!-- Dictionary Mode -->

<section id="dictionaryMode">

    <div class="searchCard">

        <h2>Search Terms</h2>

        <input id="searchInput" type="text" placeholder="Search all languages">

        <button id="clearButton">Clear</button>

        <p id="resultCount"></p>

    </div>

    <!-- Search Results -->

    <section id="resultsSection" class="tableCard">

        <h2>Search Results</h2>

        <table>

            <thead>

                <tr>
                    <th>English</th>
                    <th>Spanish</th>
                    <th>French</th>
                </tr>

            </thead>

            <tbody id="resultsBody"></tbody>

        </table>

        <p id="noResults">No matches found</p>

    </section>

    <!-- Grouped Dictionary -->

    <section class="tableCard">

        <h2>All Terms</h2>

        <div id="dictionaryBody"></div>

    </section>

</section>

<!-- Flashcard Mode -->

<section id="flashcardMode" style="display:none;">

    <div class="flashcardWrapper">

        <div id="flashcard" class="flashcard">

            <div class="flashcardInner">

                <div class="flashcardFront" id="flashFront"></div>

                <div class="flashcardBack" id="flashBack"></div>

            </div>

        </div>

    </div>

    <div class="flashcardControls">

        <button id="prevCard">Previous</button>

        <button id="flipCard">Flip</button>

        <button id="nextCard">Next</button>

    </div>

    <p id="cardCounter"></p>

</section>


</main>

<button id="topButton">↑</button>

<footer>


<p>Wine Language App</p>

<p id="footerCount"></p>


</footer>

<script src="wineTerms.js"></script>

<script src="script.js"></script>

</body>

</html>
